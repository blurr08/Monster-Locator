<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monster Energy • Dhule (2 Locations)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            position: fixed;
            inset: 0;
            z-index: 1;
            filter: grayscale(20%) contrast(1.08);
        }
        .leaflet-tile {
            filter: grayscale(100%) !important;
            opacity: 0.95;
        }
        .leaflet-popup-content-wrapper {
            background: #141414 !important;
            color: #f0f0f0 !important;
            border-radius: 20px !important;
            border: 1px solid #2c2c2c !important;
        }
        .leaflet-popup-tip {
            background: #141414 !important;
        }
        /* Monster Logo Style */
        .monster-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #00cc00, #008800);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            box-shadow: 0 0 0 2px #000, 0 0 0 4px #00aa00;
            font-family: 'Impact', 'Arial Black', sans-serif;
        }
        .monster-logo span {
            transform: rotate(-5deg);
        }
        /* Sidebar */
        #sidebar {
            position: fixed;
            z-index: 15;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 360px;
            max-height: calc(100vh - 48px);
            background: rgba(17, 17, 17, 0.96);
            backdrop-filter: blur(2px);
            border: 1px solid #2a2a2a;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        #sidebar.collapsed {
            transform: translateY(-50%) translateX(-120%);
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-header {
            padding: 22px 20px 14px 22px;
            border-bottom: 1px solid #242424;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .brand-text {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 0.72rem;
            color: #aaa;
            margin-top: 4px;
        }
        .city-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: #1e1e1e;
            margin-top: 8px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .city-badge strong { color: #ffd966; }
        .spot-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .monster-card {
            background: #181818;
            border: 1px solid #2c2c2c;
            border-radius: 24px;
            padding: 16px 18px;
            transition: 0.2s;
        }
        .monster-card:hover {
            background: #202020;
            transform: translateY(-2px);
        }
        .spot-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .spot-name span {
            background: #2c2c2c;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 30px;
            color: #ffd966;
        }
        .address-detail {
            font-size: 0.75rem;
            color: #aaa;
            margin: 8px 0 4px;
        }
        .coords-text {
            font-family: monospace;
            font-size: 0.65rem;
            background: #0f0f0f;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 6px;
            color: #bbb;
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-take-me {
            background: #0066cc;
            border: none;
            color: white;
            font-weight: 600;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
        }
        .btn-take-me:hover {
            background: #0088ff;
            transform: scale(0.98);
        }
        .distance-info {
            font-size: 0.7rem;
            background: #00000040;
            padding: 4px 12px;
            border-radius: 50px;
        }
        .sidebar-footer {
            padding: 12px 16px 18px;
            border-top: 1px solid #242424;
            display: flex;
            gap: 12px;
        }
        .side-btn {
            flex: 1;
            background: #1c1c1c;
            border: 1px solid #303030;
            border-radius: 40px;
            padding: 11px 0;
            font-weight: 600;
            font-size: 0.75rem;
            color: #ddd;
            cursor: pointer;
            text-align: center;
        }
        .side-btn.primary {
            background: #ffffff;
            color: #000;
            font-weight: 700;
        }
        .fab {
            position: fixed;
            z-index: 20;
            right: 18px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #111111dd;
            backdrop-filter: blur(8px);
            border: 1px solid #3a3a3a;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
        }
        #fab-locate { bottom: 90px; }
        #fab-toggle-sidebar { bottom: 150px; }
        .toast-notify {
            position: fixed;
            z-index: 120;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1f1f1f;
            backdrop-filter: blur(12px);
            border: 1px solid #3a3a3a;
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            white-space: nowrap;
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }
        .toast-close { margin-left: 8px; opacity: 0.6; cursor: pointer; }
        .location-status {
            position: fixed;
            z-index: 15;
            top: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 1px solid #ffd966;
            border-radius: 40px;
            padding: 8px 16px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            pointer-events: none;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }
        .dot.active { background: #4caf50; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: #151515;
            border: 1px solid #2e2e2e;
            border-radius: 32px;
            width: 90%;
            max-width: 360px;
            padding: 24px 22px;
            text-align: center;
        }
        @media (max-width: 640px) {
            #sidebar { left: 12px; right: 12px; width: auto; top: auto; bottom: 12px; transform: translateY(0); max-height: 55vh; border-radius: 24px; }
            #sidebar.collapsed { transform: translateY(110%); }
            .fab { width: 42px; height: 42px; font-size: 1.1rem; }
            #fab-locate { bottom: 70px; }
            #fab-toggle-sidebar { bottom: 122px; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-status" id="locationStatus"><span class="dot" id="statusDot"></span><span id="statusText">Location off</span></div>

<aside id="sidebar">
    <div class="sidebar-header">
        <div class="monster-logo"><span>M</span></div>
        <div>
            <div class="brand-text">MONSTER ENERGY</div>
            <div class="tagline">⚡ Dhule • Maharashtra</div>
        </div>
    </div>
    <div class="city-badge" style="margin-left: 22px; margin-bottom: 8px;">📍 <strong>2 locations</strong> in Dhule city</div>
    <div class="spot-container" id="spotList"></div>
    <div class="sidebar-footer">
        <button class="side-btn" id="refreshBtn">🔄 Refresh</button>
        <button class="side-btn primary" id="locateMeBtn">📍 Get My Location</button>
    </div>
</aside>

<div id="globalToast" class="toast-notify"><span>🧃</span><span id="toastMsg"></span><span class="toast-close" id="closeToastBtn">✕</span></div>
<div id="addModal" class="modal-overlay"><div class="modal-card"><h3>📍 Dhule Exclusive Locations</h3><p>Two Monster Energy spots in Dhule. Click "Get My Location" to see distances.</p><button id="modalCloseBtn" style="margin-top:15px;padding:8px 20px;">Got it</button></div></div>

<button id="fab-toggle-sidebar" class="fab">🗂️</button>
<button id="fab-locate" class="fab">📍</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    (function() {
        // ==================== TWO LOCATIONS IN DHULE ====================
        const LOCATIONS = [
            {
                id: "spot_main",
                name: "Monster Energy Hub",
                lat: 20.892272,
                lng: 74.773925,
                address: "Near Dhule City Center",
                coordsDMS: "20°53'32.18\"N 74°46'26.13\"E",
                tag: "MAIN"
            },
            {
                id: "spot_square",
                name: "Monster Energy Square",
                lat: 20.911280555555555,
                lng: 74.75695,
                address: "Tower Chowk, Dhule",
                coordsDMS: "20°54'40.61\"N 74°45'25.02\"E",
                tag: "NEW"
            }
        ];

        let map;
        let markers = [];
        let userMarker = null;
        let userLocation = null;
        let watchId = null;

        // DOM elements
        const spotContainer = document.getElementById('spotList');
        const locateBtn = document.getElementById('locateMeBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const fabLocate = document.getElementById('fab-locate');
        const fabToggle = document.getElementById('fab-toggle-sidebar');
        const sidebar = document.getElementById('sidebar');
        const toastDiv = document.getElementById('globalToast');
        const toastMsgSpan = document.getElementById('toastMsg');
        const closeToast = document.getElementById('closeToastBtn');
        const modal = document.getElementById('addModal');
        const modalClose = document.getElementById('modalCloseBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let toastTimer = null;
        function showToast(msg, duration = 3500) {
            toastMsgSpan.innerText = msg;
            toastDiv.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastDiv.classList.remove('show'), duration);
        }

        function updateStatusUI(active) {
            if (active && userLocation) {
                statusDot.classList.add('active');
                statusText.innerText = '📍 Active';
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = '📍 Off';
            }
        }

        // Distance calculation (meters)
        function distanceMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDist(m) {
            if (m === null) return '—';
            return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';
        }

        // Update all distance labels in cards
        function updateAllDistanceLabels() {
            if (!userLocation) {
                document.querySelectorAll('.distance-info').forEach(el => el.innerHTML = '📍 enable location');
                return;
            }
            LOCATIONS.forEach(loc => {
                const dist = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                const span = document.getElementById(`dist-${loc.id}`);
                if (span) span.innerHTML = `📍 ${formatDist(dist)} away`;
            });
        }

        // Build sidebar with cards and attach event listeners (FIXED)
        function buildSidebar() {
            spotContainer.innerHTML = '';
            for (let loc of LOCATIONS) {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.setAttribute('data-loc-id', loc.id);
                card.innerHTML = `
                    <div class="spot-name">
                        🧃 ${escapeHtml(loc.name)} <span>${escapeHtml(loc.tag)}</span>
                    </div>
                    <div class="address-detail">📍 ${escapeHtml(loc.address)}</div>
                    <div class="coords-text">🧭 ${loc.coordsDMS}</div>
                    <div class="action-row">
                        <button class="btn-take-me" data-id="${loc.id}">📍 Take me to Location</button>
                        <div class="distance-info" id="dist-${loc.id}">📍 distance: —</div>
                    </div>
                `;
                spotContainer.appendChild(card);
            }
            // Attach click events to all "Take me to Location" buttons (direct binding)
            document.querySelectorAll('.btn-take-me').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const targetLoc = LOCATIONS.find(l => l.id === id);
                    if (targetLoc) flyToLocation(targetLoc);
                    else console.warn("Location not found for id:", id);
                });
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Custom Monster Energy marker icon (claw-like "M")
        function createMonsterIcon() {
            const html = `
                <div style="
                    width:36px; height:36px;
                    background: radial-gradient(circle at 30% 30%, #00cc00, #006600);
                    border-radius: 50%;
                    display: flex;
                    align-items: center;
                    justify-content: center;
                    font-weight: 900;
                    font-size: 1.6rem;
                    color: white;
                    font-family: 'Impact', sans-serif;
                    border: 2px solid #ffcc00;
                    box-shadow: 0 0 0 3px black;
                    text-shadow: 1px 1px 0 #000;
                ">M</div>
            `;
            return L.divIcon({ html, iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0, -20] });
        }

        function createUserIcon() {
            const html = `<div style="width:20px;height:20px;background:#4285f4;border-radius:50%;border:3px solid white;box-shadow:0 0 0 4px rgba(66,133,244,0.3);"></div>`;
            return L.divIcon({ html, iconSize: [20,20], iconAnchor: [10,10] });
        }

        // Render both location markers
        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            LOCATIONS.forEach(loc => {
                const icon = createMonsterIcon();
                const marker = L.marker([loc.lat, loc.lng], { icon })
                    .addTo(map)
                    .bindPopup(`
                        <div style="text-align:center;">
                            <strong>🧃 ${escapeHtml(loc.name)}</strong><br/>
                            <span style="font-size:0.7rem;">${escapeHtml(loc.address)}</span><br/>
                            <span style="font-size:0.65rem;">${loc.coordsDMS}</span>
                        </div>
                    `);
                markers.push({ marker, id: loc.id });
            });
        }

        function renderUserMarker() {
            if (userMarker) map.removeLayer(userMarker);
            if (userLocation) {
                const icon = createUserIcon();
                userMarker = L.marker([userLocation.lat, userLocation.lng], { icon, zIndexOffset: 1000 })
                    .addTo(map)
                    .bindPopup('<b>📍 You are here</b>');
            }
        }

        // Fly to a specific location and open popup
        function flyToLocation(loc) {
            if (!map) return;
            map.flyTo([loc.lat, loc.lng], 16, { duration: 1.2 });
            setTimeout(() => {
                const markerObj = markers.find(m => m.id === loc.id);
                if (markerObj) {
                    markerObj.marker.openPopup();
                    const el = markerObj.marker.getElement();
                    if (el) {
                        el.style.transform = 'scale(1.3)';
                        setTimeout(() => { if (el) el.style.transform = ''; }, 400);
                    }
                }
            }, 300);
            showToast(`🧃 Taking you to ${loc.name} in Dhule!`, 2000);
        }

        // Geolocation with browser permission prompt
        function getLocation() {
            if (!navigator.geolocation) {
                showToast("⚠️ Browser does not support geolocation", 3000);
                return;
            }
            showToast("📍 Requesting location permission...", 2000);
            statusText.innerText = '📍 Requesting...';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    renderUserMarker();
                    updateAllDistanceLabels();
                    updateStatusUI(true);
                    // Fit map to show both spots + user
                    const allPoints = LOCATIONS.map(l => [l.lat, l.lng]);
                    allPoints.push([userLocation.lat, userLocation.lng]);
                    map.fitBounds(L.latLngBounds(allPoints), { padding: [60, 60] });
                    let nearestDist = Infinity;
                    LOCATIONS.forEach(loc => {
                        const d = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                        if (d < nearestDist) nearestDist = d;
                    });
                    showToast(`✅ Location set! Nearest spot is ${formatDist(nearestDist)} away.`, 4500);
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    watchId = navigator.geolocation.watchPosition(
                        (newPos) => {
                            userLocation = { lat: newPos.coords.latitude, lng: newPos.coords.longitude };
                            renderUserMarker();
                            updateAllDistanceLabels();
                        },
                        err => console.warn("Watch error", err),
                        { enableHighAccuracy: true, maximumAge: 10000 }
                    );
                },
                (err) => {
                    console.error("Geo error", err.code);
                    let msg = "";
                    if (err.code === 1) msg = "❌ Permission denied. Please allow location access.";
                    else if (err.code === 2) msg = "📍 Location unavailable. Turn on GPS.";
                    else if (err.code === 3) msg = "⏰ Timeout. Try again.";
                    else msg = "⚠️ Could not get location.";
                    showToast(msg, 5000);
                    updateStatusUI(false);
                    statusText.innerText = '📍 Denied';
                    const bounds = L.latLngBounds(LOCATIONS.map(l => [l.lat, l.lng]));
                    map.fitBounds(bounds, { padding: [40, 40] });
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function refreshMap() {
            renderMarkers();
            if (userLocation) {
                renderUserMarker();
                updateAllDistanceLabels();
                updateStatusUI(true);
            } else {
                updateAllDistanceLabels();
                updateStatusUI(false);
            }
            showToast("🔄 Map refreshed • Both Dhule spots visible", 1800);
        }

        // Initialize map with both spots in view
        function initMap() {
            const bounds = L.latLngBounds(LOCATIONS.map(l => [l.lat, l.lng]));
            map = L.map('map').fitBounds(bounds, { padding: [40, 40] });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
            }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            renderMarkers();
            buildSidebar();     // creates cards and attaches button events
            updateAllDistanceLabels();
            updateStatusUI(false);
            map.on('dblclick', () => {
                modal.classList.add('active');
                setTimeout(() => modal.classList.remove('active'), 3000);
            });
        }

        // Event binding
        function bindEvents() {
            locateBtn.addEventListener('click', getLocation);
            refreshBtn.addEventListener('click', refreshMap);
            fabLocate.addEventListener('click', getLocation);
            fabToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
            closeToast.addEventListener('click', (e) => {
                e.stopPropagation();
                toastDiv.classList.remove('show');
                if (toastTimer) clearTimeout(toastTimer);
            });
            toastDiv.addEventListener('click', (e) => {
                if (e.target === closeToast) return;
                if (userLocation) {
                    let nearest = LOCATIONS[0];
                    let minDist = Infinity;
                    LOCATIONS.forEach(loc => {
                        const d = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                        if (d < minDist) { minDist = d; nearest = loc; }
                    });
                    flyToLocation(nearest);
                } else {
                    flyToLocation(LOCATIONS[0]);
                }
                toastDiv.classList.remove('show');
            });
            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && modal.classList.contains('active')) modal.classList.remove('active');
                if (e.ctrlKey && e.shiftKey && e.key === 'L') { e.preventDefault(); getLocation(); }
                if (e.ctrlKey && e.shiftKey && e.key === 'B') { e.preventDefault(); sidebar.classList.toggle('collapsed'); }
                if (e.ctrlKey && e.shiftKey && e.key === '1') { e.preventDefault(); flyToLocation(LOCATIONS[0]); }
                if (e.ctrlKey && e.shiftKey && e.key === '2') { e.preventDefault(); flyToLocation(LOCATIONS[1]); }
            });
        }

        initMap();
        bindEvents();
        setTimeout(() => showToast("🧃 Two Monster spots in Dhule! Click 'Get My Location' to see distances.", 5000), 1000);
        console.log("✅ Dhule map ready | Monster logo + fixed Take Me buttons");
    })();
</script>
</body>
</html>
