<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monster Energy • Dhule (2 Locations with Routes)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        .leaflet-tile {
            filter: grayscale(100%) !important;
            opacity: 0.95;
        }
        /* Monster Logo */
        .monster-logo {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 30% 35%, #1ecc00, #006600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            font-family: 'Impact', 'Arial Black', sans-serif;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 0 2px black;
            text-shadow: 1px 1px 0 #000;
        }
        /* Sidebar */
        #sidebar {
            position: fixed;
            z-index: 15;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 380px;
            max-height: calc(100vh - 48px);
            background: rgba(17, 17, 17, 0.96);
            backdrop-filter: blur(2px);
            border: 1px solid #2a2a2a;
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        #sidebar.collapsed {
            transform: translateY(-50%) translateX(-120%);
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-header {
            padding: 22px 20px 14px 22px;
            border-bottom: 1px solid #242424;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .brand-text {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        .tagline {
            font-size: 0.7rem;
            color: #aaa;
        }
        .city-badge {
            display: inline-block;
            background: #1e1e1e;
            margin: 8px 0 0 22px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
        }
        .spot-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .monster-card {
            background: #181818;
            border: 1px solid #2c2c2c;
            border-radius: 24px;
            padding: 16px;
            transition: 0.2s;
        }
        .spot-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .spot-name span {
            background: #2c2c2c;
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 30px;
            color: #ffd966;
        }
        .address-detail {
            font-size: 0.75rem;
            color: #aaa;
            margin: 8px 0 4px;
        }
        .coords-text {
            font-family: monospace;
            font-size: 0.65rem;
            background: #0f0f0f;
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            margin-top: 6px;
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-take-me, .btn-route {
            border: none;
            color: white;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .btn-take-me {
            background: #0066cc;
        }
        .btn-take-me:hover {
            background: #0088ff;
            transform: scale(0.97);
        }
        .btn-route {
            background: #28a745;
        }
        .btn-route:hover {
            background: #34ce57;
            transform: scale(0.97);
        }
        .distance-info {
            font-size: 0.7rem;
            background: #00000060;
            padding: 4px 10px;
            border-radius: 50px;
        }
        .sidebar-footer {
            padding: 12px 16px 18px;
            border-top: 1px solid #242424;
            display: flex;
            gap: 12px;
        }
        .side-btn {
            flex: 1;
            background: #1c1c1c;
            border: 1px solid #303030;
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.75rem;
            color: #ddd;
            cursor: pointer;
            text-align: center;
        }
        .side-btn.primary {
            background: #ffffff;
            color: #000;
        }
        .fab {
            position: fixed;
            z-index: 20;
            right: 18px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: #111111dd;
            backdrop-filter: blur(8px);
            border: 1px solid #3a3a3a;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.5);
        }
        #fab-locate { bottom: 90px; }
        #fab-toggle-sidebar { bottom: 150px; }
        .toast-notify {
            position: fixed;
            z-index: 120;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: #1f1f1f;
            backdrop-filter: blur(12px);
            border: 1px solid #3a3a3a;
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            white-space: nowrap;
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }
        .toast-close { margin-left: 8px; opacity: 0.6; cursor: pointer; }
        .location-status {
            position: fixed;
            z-index: 15;
            top: 20px;
            right: 20px;
            background: #1a1a1a;
            border: 1px solid #ffd966;
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }
        .dot.active { background: #4caf50; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(6px);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: #151515;
            border: 1px solid #2e2e2e;
            border-radius: 32px;
            width: 90%;
            max-width: 360px;
            padding: 24px;
            text-align: center;
        }
        /* Routing control custom style */
        .leaflet-routing-container {
            background-color: #1e1e1e;
            border-color: #444;
            color: #fff;
        }
        .leaflet-routing-container h2 {
            color: #ffd966;
        }
        @media (max-width: 640px) {
            #sidebar { left: 12px; right: 12px; width: auto; top: auto; bottom: 12px; transform: translateY(0); max-height: 55vh; }
            #sidebar.collapsed { transform: translateY(110%); }
            .fab { width: 42px; height: 42px; }
            #fab-locate { bottom: 70px; }
            #fab-toggle-sidebar { bottom: 122px; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn-take-me, .btn-route { justify-content: center; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-status" id="locationStatus"><span class="dot" id="statusDot"></span><span id="statusText">Location off</span></div>

<aside id="sidebar">
    <div class="sidebar-header">
        <div class="monster-logo">M</div>
        <div>
            <div class="brand-text">MONSTER ENERGY</div>
            <div class="tagline">⚡ Dhule • Maharashtra</div>
        </div>
    </div>
    <div class="city-badge">📍 2 locations in Dhule city</div>
    <div class="spot-container" id="spotList"></div>
    <div class="sidebar-footer">
        <button class="side-btn" id="refreshBtn">🔄 Refresh</button>
        <button class="side-btn primary" id="locateMeBtn">📍 Get My Location</button>
    </div>
</aside>

<div id="globalToast" class="toast-notify"><span>🧃</span><span id="toastMsg"></span><span class="toast-close" id="closeToastBtn">✕</span></div>
<div id="addModal" class="modal-overlay"><div class="modal-card"><h3>🧃 Monster Energy Dhule</h3><p>Two official spots. Click "Route" after enabling location to get directions.</p><button id="modalCloseBtn" style="margin-top:15px;padding:8px 20px;">OK</button></div></div>

<button id="fab-toggle-sidebar" class="fab">🗂️</button>
<button id="fab-locate" class="fab">📍</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
<script>
    (function() {
        // ----- TWO EXACT LOCATIONS IN DHULE -----
        const LOCATIONS = [
            {
                id: "spot_main",
                name: "Monster Energy Hub",
                lat: 20.892272,
                lng: 74.773925,
                address: "Near Dhule City Center",
                coordsDMS: "20°53'32.18\"N 74°46'26.13\"E",
                tag: "MAIN"
            },
            {
                id: "spot_square",
                name: "Monster Energy Square",
                lat: 20.911280555555555,
                lng: 74.75695,
                address: "Tower Chowk, Dhule",
                coordsDMS: "20°54'40.61\"N 74°45'25.02\"E",
                tag: "NEW"
            }
        ];

        let map;
        let markers = [];
        let userMarker = null;
        let userLocation = null;
        let watchId = null;
        let currentRouteControl = null;  // to remove previous route

        // DOM elements
        const spotContainer = document.getElementById('spotList');
        const locateBtn = document.getElementById('locateMeBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const fabLocate = document.getElementById('fab-locate');
        const fabToggle = document.getElementById('fab-toggle-sidebar');
        const sidebar = document.getElementById('sidebar');
        const toastDiv = document.getElementById('globalToast');
        const toastMsgSpan = document.getElementById('toastMsg');
        const closeToast = document.getElementById('closeToastBtn');
        const modal = document.getElementById('addModal');
        const modalClose = document.getElementById('modalCloseBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let toastTimer = null;
        function showToast(msg, duration = 3500) {
            toastMsgSpan.innerText = msg;
            toastDiv.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastDiv.classList.remove('show'), duration);
        }

        function updateStatusUI(active) {
            if (active && userLocation) {
                statusDot.classList.add('active');
                statusText.innerText = 'Active';
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = 'Off';
            }
        }

        function distanceMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDist(m) {
            if (m === null) return '—';
            return m < 1000 ? Math.round(m) + ' m' : (m/1000).toFixed(1) + ' km';
        }

        function updateAllDistanceLabels() {
            if (!userLocation) {
                document.querySelectorAll('.distance-info').forEach(el => el.innerHTML = '📍 enable location');
                return;
            }
            LOCATIONS.forEach(loc => {
                const dist = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                const span = document.getElementById(`dist-${loc.id}`);
                if (span) span.innerHTML = `📍 ${formatDist(dist)} away`;
            });
        }

        // Remove existing route from map
        function clearRoute() {
            if (currentRouteControl) {
                map.removeControl(currentRouteControl);
                currentRouteControl = null;
            }
        }

        // Show route from userLocation to destination
        function showRoute(destLat, destLng, destName) {
            if (!userLocation) {
                showToast("📍 Please enable location first (click 'Get My Location')", 4000);
                return;
            }
            clearRoute();
            // Create routing control
            currentRouteControl = L.Routing.control({
                waypoints: [
                    L.latLng(userLocation.lat, userLocation.lng),
                    L.latLng(destLat, destLng)
                ],
                routeWhileDragging: false,
                showAlternatives: false,
                fitSelectedRoutes: true,
                lineOptions: {
                    styles: [{ color: '#00ccff', weight: 6, opacity: 0.8 }]
                },
                router: L.Routing.osrmv1({
                    serviceUrl: 'https://router.project-osrm.org/route/v1/'
                }),
                show: true,
                addWaypoints: false,
                draggableWaypoints: false
            }).addTo(map);
            
            showToast(`🧭 Route to ${destName} loaded. Follow blue line.`, 4000);
        }

        // Build sidebar cards with two buttons
        function buildSidebar() {
            spotContainer.innerHTML = '';
            LOCATIONS.forEach(loc => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <div class="spot-name">
                        🧃 ${escapeHtml(loc.name)} <span>${escapeHtml(loc.tag)}</span>
                    </div>
                    <div class="address-detail">📍 ${escapeHtml(loc.address)}</div>
                    <div class="coords-text">🧭 ${loc.coordsDMS}</div>
                    <div class="action-row">
                        <div class="btn-group">
                            <button class="btn-take-me" data-id="${loc.id}">📍 Take me</button>
                            <button class="btn-route" data-id="${loc.id}">🧭 Route</button>
                        </div>
                        <div class="distance-info" id="dist-${loc.id}">📍 distance: —</div>
                    </div>
                `;
                spotContainer.appendChild(card);
            });
            // Attach event listeners for both buttons
            document.querySelectorAll('.btn-take-me').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const loc = LOCATIONS.find(l => l.id === id);
                    if (loc) flyToLocation(loc);
                });
            });
            document.querySelectorAll('.btn-route').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const id = btn.getAttribute('data-id');
                    const loc = LOCATIONS.find(l => l.id === id);
                    if (loc) {
                        if (!userLocation) {
                            showToast("📍 Please get your location first (click 'Get My Location')", 4000);
                            return;
                        }
                        showRoute(loc.lat, loc.lng, loc.name);
                    }
                });
            });
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // Monster Energy map marker
        function createMonsterIcon() {
            const html = `<div style="width:36px;height:36px;background:radial-gradient(circle at 30% 35%, #1ecc00, #006600);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.4rem;color:white;font-family:'Impact',sans-serif;border:2px solid #ffcc00;box-shadow:0 0 0 2px black;">M</div>`;
            return L.divIcon({ html, iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0, -20] });
        }

        function createUserIcon() {
            const html = `<div style="width:20px;height:20px;background:#4285f4;border-radius:50%;border:3px solid white;box-shadow:0 0 0 4px rgba(66,133,244,0.3);"></div>`;
            return L.divIcon({ html, iconSize: [20,20], iconAnchor: [10,10] });
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            LOCATIONS.forEach(loc => {
                const icon = createMonsterIcon();
                const marker = L.marker([loc.lat, loc.lng], { icon })
                    .addTo(map)
                    .bindPopup(`
                        <div style="text-align:center;">
                            <strong>🧃 ${escapeHtml(loc.name)}</strong><br/>
                            ${escapeHtml(loc.address)}<br/>
                            <small>${loc.coordsDMS}</small>
                        </div>
                    `);
                markers.push({ marker, id: loc.id });
            });
        }

        function renderUserMarker() {
            if (userMarker) map.removeLayer(userMarker);
            if (userLocation) {
                const icon = createUserIcon();
                userMarker = L.marker([userLocation.lat, userLocation.lng], { icon, zIndexOffset: 1000 })
                    .addTo(map)
                    .bindPopup('<b>📍 You are here</b>');
            }
        }

        function flyToLocation(loc) {
            if (!map) return;
            map.flyTo([loc.lat, loc.lng], 16, { duration: 1.2 });
            setTimeout(() => {
                const markerObj = markers.find(m => m.id === loc.id);
                if (markerObj) {
                    markerObj.marker.openPopup();
                    const el = markerObj.marker.getElement();
                    if (el) {
                        el.style.transform = 'scale(1.3)';
                        setTimeout(() => { if (el) el.style.transform = ''; }, 400);
                    }
                }
            }, 300);
            showToast(`🧃 Flying to ${loc.name}`, 2000);
        }

        function getLocation() {
            if (!navigator.geolocation) {
                showToast("⚠️ Browser doesn't support geolocation", 3000);
                return;
            }
            showToast("📍 Requesting location...", 2000);
            statusText.innerText = 'Requesting...';
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    renderUserMarker();
                    updateAllDistanceLabels();
                    updateStatusUI(true);
                    // Clear any existing route when location changes
                    clearRoute();
                    const allPoints = LOCATIONS.map(l => [l.lat, l.lng]);
                    allPoints.push([userLocation.lat, userLocation.lng]);
                    map.fitBounds(L.latLngBounds(allPoints), { padding: [60, 60] });
                    let nearest = Infinity;
                    LOCATIONS.forEach(loc => {
                        const d = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                        if (d < nearest) nearest = d;
                    });
                    showToast(`✅ Location set! Nearest spot is ${formatDist(nearest)} away.`, 4500);
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    watchId = navigator.geolocation.watchPosition(
                        (newPos) => {
                            userLocation = { lat: newPos.coords.latitude, lng: newPos.coords.longitude };
                            renderUserMarker();
                            updateAllDistanceLabels();
                            // Optionally clear route because origin changed (user moved)
                            clearRoute();
                        },
                        err => console.warn(err),
                        { enableHighAccuracy: true, maximumAge: 10000 }
                    );
                },
                (err) => {
                    let msg = "";
                    if (err.code === 1) msg = "❌ Permission denied. Allow location access.";
                    else if (err.code === 2) msg = "📍 Location unavailable.";
                    else if (err.code === 3) msg = "⏰ Timeout.";
                    else msg = "⚠️ Could not get location.";
                    showToast(msg, 5000);
                    updateStatusUI(false);
                    statusText.innerText = 'Denied';
                    const bounds = L.latLngBounds(LOCATIONS.map(l => [l.lat, l.lng]));
                    map.fitBounds(bounds, { padding: [40, 40] });
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function refreshMap() {
            renderMarkers();
            if (userLocation) {
                renderUserMarker();
                updateAllDistanceLabels();
                updateStatusUI(true);
            } else {
                updateAllDistanceLabels();
                updateStatusUI(false);
            }
            clearRoute();  // remove old route on refresh
            showToast("🔄 Map refreshed", 1500);
        }

        function initMap() {
            const bounds = L.latLngBounds(LOCATIONS.map(l => [l.lat, l.lng]));
            map = L.map('map').fitBounds(bounds, { padding: [40, 40] });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
            }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            renderMarkers();
            buildSidebar();
            updateAllDistanceLabels();
            updateStatusUI(false);
            map.on('dblclick', () => {
                modal.classList.add('active');
                setTimeout(() => modal.classList.remove('active'), 3000);
            });
        }

        function bindEvents() {
            locateBtn.addEventListener('click', getLocation);
            refreshBtn.addEventListener('click', refreshMap);
            fabLocate.addEventListener('click', getLocation);
            fabToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
            closeToast.addEventListener('click', (e) => {
                e.stopPropagation();
                toastDiv.classList.remove('show');
                if (toastTimer) clearTimeout(toastTimer);
            });
            toastDiv.addEventListener('click', (e) => {
                if (e.target === closeToast) return;
                if (userLocation) {
                    let nearest = LOCATIONS[0];
                    let minD = Infinity;
                    LOCATIONS.forEach(loc => {
                        const d = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                        if (d < minD) { minD = d; nearest = loc; }
                    });
                    flyToLocation(nearest);
                } else {
                    flyToLocation(LOCATIONS[0]);
                }
                toastDiv.classList.remove('show');
            });
            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') modal.classList.remove('active');
                if (e.ctrlKey && e.shiftKey && e.key === 'L') { e.preventDefault(); getLocation(); }
                if (e.ctrlKey && e.shiftKey && e.key === 'B') { e.preventDefault(); sidebar.classList.toggle('collapsed'); }
                if (e.ctrlKey && e.shiftKey && e.key === '1') { e.preventDefault(); flyToLocation(LOCATIONS[0]); }
                if (e.ctrlKey && e.shiftKey && e.key === '2') { e.preventDefault(); flyToLocation(LOCATIONS[1]); }
            });
        }

        initMap();
        bindEvents();
        setTimeout(() => showToast("🧃 Monster Energy Dhule • Click 'Route' after enabling location for directions", 5000), 1000);
        console.log("✅ Map ready with route buttons.");
    })();
</script>
</body>
</html>
