<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monster Energy • Dhule</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        .leaflet-tile {
            filter: grayscale(100%) !important;
            opacity: 0.95;
        }
        .monster-logo {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 30% 35%, #1ecc00, #006600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            font-family: 'Impact', 'Arial Black', sans-serif;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 0 2px black;
            text-shadow: 1px 1px 0 #000;
        }
        #sidebar {
            position: fixed;
            z-index: 15;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 380px;
            max-height: calc(100vh - 48px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s ease;
        }
        #sidebar.collapsed {
            transform: translateY(-50%) translateX(-120%);
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-header {
            padding: 22px 20px 14px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.2);
        }
        .brand-text {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            color: white;
        }
        .tagline {
            font-size: 0.7rem;
            color: #eee;
        }
        .city-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            margin: 8px 0 0 22px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(255,255,255,0.3);
            color: #fff;
        }
        .spot-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .monster-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 28px;
            padding: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .monster-card:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 215, 0, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .spot-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .spot-name span {
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 30px;
            color: #ffd966;
            backdrop-filter: blur(2px);
        }
        .address-detail {
            font-size: 0.75rem;
            color: #f0f0f0;
            margin: 6px 0;
        }
        .coords-text {
            font-family: monospace;
            font-size: 0.65rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            margin: 6px 0;
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-group {
            display: flex;
            gap: 10px;
        }
        .btn-take-me, .btn-route {
            border: none;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: inherit;
            backdrop-filter: blur(4px);
        }
        .btn-take-me {
            background: rgba(0, 102, 204, 0.85);
            color: white;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        .btn-take-me:hover {
            background: #0088ff;
            transform: scale(0.97);
        }
        .btn-route {
            background: rgba(40, 167, 69, 0.85);
            color: white;
        }
        .btn-route:hover {
            background: #34ce57;
            transform: scale(0.97);
        }
        .distance-info {
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 50px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            color: white;
        }
        .sidebar-footer {
            padding: 12px 16px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
        }
        .side-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .side-btn.primary {
            background: rgba(255, 255, 255, 0.85);
            color: #000;
            border-color: rgba(255,255,255,0.5);
        }
        .side-btn:hover {
            background: rgba(100, 100, 120, 0.7);
        }
        .fab {
            position: fixed;
            z-index: 20;
            right: 18px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .fab:hover {
            background: rgba(40,40,50,0.9);
            transform: scale(1.05);
        }
        #fab-locate { bottom: 90px; }
        #fab-toggle-sidebar { bottom: 150px; }
        .toast-notify {
            position: fixed;
            z-index: 120;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 60px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            font-size: 0.85rem;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            white-space: nowrap;
            color: white;
        }
        .toast-notify.show { transform: translateX(-50%) translateY(0); }
        .toast-close { margin-left: 8px; opacity: 0.6; cursor: pointer; }
        .location-status {
            position: fixed;
            z-index: 15;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }
        .dot.active { background: #4caf50; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: rgba(20, 20, 20, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 32px;
            width: 90%;
            max-width: 360px;
            padding: 24px;
            text-align: center;
            color: white;
        }
        @media (max-width: 640px) {
            #sidebar { left: 12px; right: 12px; width: auto; top: auto; bottom: 12px; transform: translateY(0); max-height: 55vh; }
            #sidebar.collapsed { transform: translateY(110%); }
            .fab { width: 42px; height: 42px; }
            #fab-locate { bottom: 70px; }
            #fab-toggle-sidebar { bottom: 122px; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn-take-me, .btn-route { justify-content: center; }
            .distance-info { white-space: normal; text-align: center; margin-top: 5px; width: 100%; }
            .action-row { flex-direction: column; align-items: stretch; }
        }
        .spot-container::-webkit-scrollbar {
            width: 4px;
        }
        .spot-container::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }
        .spot-container::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.4);
            border-radius: 10px;
        }
        .monster-card.nearest {
            border: 1px solid #ffcc00;
            background: rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }
        .distance-loading {
            opacity: 0.7;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-status" id="locationStatus"><span class="dot" id="statusDot"></span><span id="statusText">Location off</span></div>

<aside id="sidebar">
    <div class="sidebar-header">
        <div class="monster-logo">M</div>
        <div>
            <div class="brand-text">MONSTER ENERGY</div>
            <div class="tagline">⚡ Dhule • Maharashtra</div>
        </div>
    </div>
    <div class="city-badge">📍 5 spots in Dhule</div>
    <div class="spot-container" id="spotList"></div>
    <div class="sidebar-footer">
        <button class="side-btn" id="refreshBtn">🔄 Refresh</button>
        <button class="side-btn primary" id="locateMeBtn">📍 Get My Location</button>
    </div>
</aside>

<div id="globalToast" class="toast-notify"><span>🧃</span><span id="toastMsg"></span><span class="toast-close" id="closeToastBtn">✕</span></div>
<div id="addModal" class="modal-overlay"><div class="modal-card"><h3>🧃 Monster Energy Dhule</h3><p></p></p><button id="modalCloseBtn" style="margin-top:15px;padding:8px 20px;">OK</button></div></div>

<button id="fab-toggle-sidebar" class="fab">🗂️</button>
<button id="fab-locate" class="fab">📍</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    (function() {
        // ----- FIVE LOCATIONS -----
        const MASTER_LOCATIONS = [
            { id: "spot_main", name: "Monster Energy Hub", lat: 20.892272, lng: 74.773925, address: "Near Dhule City Center", coordsDMS: "20°53'32.18\"N 74°46'26.13\"E", tag: "MAIN" },
            { id: "spot_square", name: "Monster Energy Square", lat: 20.911280555555555, lng: 74.75695, address: "Tower Chowk, Dhule", coordsDMS: "20°54'40.61\"N 74°45'25.02\"E", tag: "NEW" },
            { id: "spot_third", name: "Monster Energy Point", lat: 20.90357777777778, lng: 74.7496, address: "Near Dhule Bus Stand", coordsDMS: "20°54'12.88\"N 74°44'58.56\"E", tag: "THIRD" },
            { id: "spot_fourth", name: "Monster Energy Plaza", lat: 20.904041666666666, lng: 74.75639444444444, address: "Near Dhule Market", coordsDMS: "20°54'14.55\"N 74°45'23.02\"E", tag: "FOURTH" },
            { id: "spot_fifth", name: "Monster Energy North", lat: 20.920369444444444, lng: 74.76649166666666, address: "North Dhule Area", coordsDMS: "20°55'13.33\"N 74°45'59.37\"E", tag: "FIFTH" }
        ];

        let map;
        let markers = [];
        let userMarker = null;
        let userLocation = null;
        let watchId = null;
        let manualFlyInProgress = false;
        let userInteracting = false;      // NEW: flag to prevent auto-fit during touch/drag
        let roadDistanceCache = new Map();

        // DOM elements
        const spotContainer = document.getElementById('spotList');
        const locateBtn = document.getElementById('locateMeBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const fabLocate = document.getElementById('fab-locate');
        const fabToggle = document.getElementById('fab-toggle-sidebar');
        const sidebar = document.getElementById('sidebar');
        const toastDiv = document.getElementById('globalToast');
        const toastMsgSpan = document.getElementById('toastMsg');
        const closeToast = document.getElementById('closeToastBtn');
        const modal = document.getElementById('addModal');
        const modalClose = document.getElementById('modalCloseBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let toastTimer = null;
        function showToast(msg, duration = 3500) {
            toastMsgSpan.innerText = msg;
            toastDiv.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toastDiv.classList.remove('show'), duration);
        }

        function updateStatusUI(active) {
            if (active && userLocation) {
                statusDot.classList.add('active');
                statusText.innerText = 'Active';
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = 'Off';
            }
        }

        // Straight-line distance for fallback
        function straightLineMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDistance(meters) {
            if (meters === null || meters === undefined) return '—';
            return meters < 1000 ? Math.round(meters) + ' m' : (meters/1000).toFixed(1) + ' km';
        }

        // Fetch real driving distance from OSRM
        async function fetchDrivingDistance(originLat, originLng, destLat, destLng) {
            const url = `https://router.project-osrm.org/route/v1/driving/${originLng},${originLat};${destLng},${destLat}?overview=false`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                    return data.routes[0].distance;
                }
                return null;
            } catch (err) {
                console.warn('OSRM fetch failed', err);
                return null;
            }
        }

        async function getRoadDistance(loc) {
            if (!userLocation) return null;
            const key = `${loc.id}_${userLocation.lat.toFixed(4)}_${userLocation.lng.toFixed(4)}`;
            if (roadDistanceCache.has(key)) return roadDistanceCache.get(key);
            const dist = await fetchDrivingDistance(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
            if (dist !== null) roadDistanceCache.set(key, dist);
            return dist;
        }

        // Render sidebar with road distances and nearest-first sorting
        async function renderSidebarWithRoadDistances() {
            if (!userLocation) {
                renderSidebarFallback();
                return;
            }
            // Fetch all road distances
            const locsWithDist = await Promise.all(MASTER_LOCATIONS.map(async (loc) => {
                const roadDist = await getRoadDistance(loc);
                return { ...loc, roadDistance: roadDist };
            }));
            // Sort by road distance (nulls go to bottom)
            locsWithDist.sort((a, b) => {
                if (a.roadDistance === null && b.roadDistance === null) return 0;
                if (a.roadDistance === null) return 1;
                if (b.roadDistance === null) return -1;
                return a.roadDistance - b.roadDistance;
            });
            // Render
            spotContainer.innerHTML = '';
            locsWithDist.forEach((loc, idx) => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                if (idx === 0) card.classList.add('nearest');
                const distanceText = (loc.roadDistance !== null) ? `🚗 ${formatDistance(loc.roadDistance)}` : '⚠️ route unavailable';
                card.innerHTML = `
                    <div class="spot-name">
                        🧃 ${escapeHtml(loc.name)} <span>${escapeHtml(loc.tag)}</span>
                    </div>
                    <div class="address-detail">📍 ${escapeHtml(loc.address)}</div>
                    <div class="coords-text">🧭 ${loc.coordsDMS}</div>
                    <div class="action-row">
                        <div class="btn-group">
                            <button class="btn-take-me" data-id="${loc.id}">📍 Take me</button>
                            <button class="btn-route" data-id="${loc.id}">🧭 Route (Google Maps)</button>
                        </div>
                        <div class="distance-info" id="dist-${loc.id}">${distanceText}</div>
                    </div>
                `;
                spotContainer.appendChild(card);
            });
            attachButtonEvents();
        }

        function renderSidebarFallback() {
            // No location: show unsorted, no distances
            spotContainer.innerHTML = '';
            MASTER_LOCATIONS.forEach(loc => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <div class="spot-name">
                        🧃 ${escapeHtml(loc.name)} <span>${escapeHtml(loc.tag)}</span>
                    </div>
                    <div class="address-detail">📍 ${escapeHtml(loc.address)}</div>
                    <div class="coords-text">🧭 ${loc.coordsDMS}</div>
                    <div class="action-row">
                        <div class="btn-group">
                            <button class="btn-take-me" data-id="${loc.id}">📍 Take me</button>
                            <button class="btn-route" data-id="${loc.id}">🧭 Route (Google Maps)</button>
                        </div>
                        <div class="distance-info">📍 enable location</div>
                    </div>
                `;
                spotContainer.appendChild(card);
            });
            attachButtonEvents();
        }

        function attachButtonEvents() {
            document.querySelectorAll('.btn-take-me').forEach(btn => {
                btn.removeEventListener('click', takeMeHandler);
                btn.addEventListener('click', takeMeHandler);
            });
            document.querySelectorAll('.btn-route').forEach(btn => {
                btn.removeEventListener('click', routeHandler);
                btn.addEventListener('click', routeHandler);
            });
        }
        function takeMeHandler(e) {
            e.stopPropagation();
            const id = e.currentTarget.getAttribute('data-id');
            const loc = MASTER_LOCATIONS.find(l => l.id === id);
            if (loc) flyToLocation(loc);
        }
        function routeHandler(e) {
            e.stopPropagation();
            const id = e.currentTarget.getAttribute('data-id');
            const loc = MASTER_LOCATIONS.find(l => l.id === id);
            if (loc) openGoogleMapsRoute(loc.lat, loc.lng, loc.name);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function openGoogleMapsRoute(destLat, destLng, destName) {
            if (!userLocation) {
                showToast("📍 Please enable location first (click 'Get My Location')", 4000);
                return;
            }
            const origin = `${userLocation.lat},${userLocation.lng}`;
            const destination = `${destLat},${destLng}`;
            const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
            window.open(url, '_blank');
            showToast(`🧭 Opening Google Maps route to ${destName}...`, 3000);
        }

        function createMonsterIcon() {
            const html = `<div style="width:36px;height:36px;background:radial-gradient(circle at 30% 35%, #1ecc00, #006600);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.4rem;color:white;font-family:'Impact',sans-serif;border:2px solid #ffcc00;box-shadow:0 0 0 2px black;">M</div>`;
            return L.divIcon({ html, iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0, -20] });
        }

        function createUserIcon() {
            const html = `<div style="width:20px;height:20px;background:#4285f4;border-radius:50%;border:3px solid white;box-shadow:0 0 0 4px rgba(66,133,244,0.3);"></div>`;
            return L.divIcon({ html, iconSize: [20,20], iconAnchor: [10,10] });
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            MASTER_LOCATIONS.forEach(loc => {
                const icon = createMonsterIcon();
                const marker = L.marker([loc.lat, loc.lng], { icon })
                    .addTo(map)
                    .bindPopup(`<div style="text-align:center;"><strong>🧃 ${escapeHtml(loc.name)}</strong><br/>${escapeHtml(loc.address)}<br/><small>${loc.coordsDMS}</small></div>`);
                markers.push({ marker, id: loc.id });
            });
        }

        function renderUserMarker() {
            if (userMarker) map.removeLayer(userMarker);
            if (userLocation) {
                const icon = createUserIcon();
                userMarker = L.marker([userLocation.lat, userLocation.lng], { icon, zIndexOffset: 1000 })
                    .addTo(map)
                    .bindPopup('<b>📍 You are here</b>');
            }
        }

        function flyToLocation(loc) {
            if (!map) return;
            manualFlyInProgress = true;
            map.flyTo([loc.lat, loc.lng], 16, { duration: 1.2 });
            setTimeout(() => {
                const markerObj = markers.find(m => m.id === loc.id);
                if (markerObj) {
                    markerObj.marker.openPopup();
                    const el = markerObj.marker.getElement();
                    if (el) {
                        el.style.transform = 'scale(1.3)';
                        setTimeout(() => { if (el) el.style.transform = ''; }, 400);
                    }
                }
                setTimeout(() => { manualFlyInProgress = false; }, 1500);
            }, 300);
            showToast(`🧃 Flying to ${loc.name}`, 2000);
        }

        // Only auto-fit bounds when user is not interacting with the map
        function autoFitBounds() {
            if (manualFlyInProgress || userInteracting) return;
            if (!userLocation) return;
            const allPoints = MASTER_LOCATIONS.map(l => [l.lat, l.lng]);
            allPoints.push([userLocation.lat, userLocation.lng]);
            map.fitBounds(L.latLngBounds(allPoints), { padding: [60, 60] });
        }

        async function refreshUIAfterLocation(shouldFitBounds = true) {
            renderUserMarker();
            if (userLocation) {
                roadDistanceCache.clear();
                await renderSidebarWithRoadDistances();
                updateStatusUI(true);
                if (shouldFitBounds) autoFitBounds();
                // Show nearest info via toast
                const nearestCard = document.querySelector('.monster-card.nearest');
                if (nearestCard) {
                    const nameSpan = nearestCard.querySelector('.spot-name');
                    if (nameSpan) {
                        showToast(`📍 Nearest: ${nameSpan.innerText.split('🧃')[1]?.trim() || 'spot'}`, 4000);
                    }
                }
            } else {
                renderSidebarFallback();
                updateStatusUI(false);
            }
        }

        function getLocation() {
            if (!navigator.geolocation) {
                showToast("⚠️ Browser doesn't support geolocation", 3000);
                return;
            }
            showToast("📍 Requesting location...", 2000);
            statusText.innerText = 'Requesting...';
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    await refreshUIAfterLocation(true); // fit bounds on first acquisition
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    watchId = navigator.geolocation.watchPosition(
                        async (newPos) => {
                            userLocation = { lat: newPos.coords.latitude, lng: newPos.coords.longitude };
                            await refreshUIAfterLocation(false); // no auto-fit on background updates
                        },
                        err => console.warn("Watch error:", err),
                        { enableHighAccuracy: true, maximumAge: 10000 }
                    );
                },
                (err) => {
                    let msg = "";
                    if (err.code === 1) msg = "❌ Permission denied. Allow location access.";
                    else if (err.code === 2) msg = "📍 Location unavailable.";
                    else if (err.code === 3) msg = "⏰ Timeout.";
                    else msg = "⚠️ Could not get location.";
                    showToast(msg, 5000);
                    updateStatusUI(false);
                    statusText.innerText = 'Denied';
                    renderSidebarFallback();
                    const bounds = L.latLngBounds(MASTER_LOCATIONS.map(l => [l.lat, l.lng]));
                    map.fitBounds(bounds, { padding: [40, 40] });
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        function refreshMap() {
            renderMarkers();
            if (userLocation) {
                refreshUIAfterLocation(true);
            } else {
                renderSidebarFallback();
                updateStatusUI(false);
                const bounds = L.latLngBounds(MASTER_LOCATIONS.map(l => [l.lat, l.lng]));
                map.fitBounds(bounds, { padding: [40, 40] });
            }
            showToast("🔄 Map refreshed", 1500);
        }

        function initMap() {
            const bounds = L.latLngBounds(MASTER_LOCATIONS.map(l => [l.lat, l.lng]));
            map = L.map('map').fitBounds(bounds, { padding: [40, 40] });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
            }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            renderMarkers();
            renderSidebarFallback();
            updateStatusUI(false);
            map.on('dblclick', () => {
                modal.classList.add('active');
                setTimeout(() => modal.classList.remove('active'), 3000);
            });
            // Detect user interaction (touch/mouse) to block auto-fit
            map.on('dragstart zoomstart', () => { userInteracting = true; });
            map.on('dragend zoomend', () => {
                setTimeout(() => { userInteracting = false; }, 500);
            });
        }

        function bindEvents() {
            locateBtn.addEventListener('click', getLocation);
            refreshBtn.addEventListener('click', refreshMap);
            fabLocate.addEventListener('click', getLocation);
            fabToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
            closeToast.addEventListener('click', (e) => {
                e.stopPropagation();
                toastDiv.classList.remove('show');
                if (toastTimer) clearTimeout(toastTimer);
            });
            toastDiv.addEventListener('click', (e) => {
                if (e.target === closeToast) return;
                if (userLocation) {
                    const nearestCard = document.querySelector('.monster-card.nearest');
                    if (nearestCard) {
                        const id = nearestCard.querySelector('.btn-take-me')?.getAttribute('data-id');
                        const loc = MASTER_LOCATIONS.find(l => l.id === id);
                        if (loc) flyToLocation(loc);
                    }
                } else {
                    flyToLocation(MASTER_LOCATIONS[0]);
                }
                toastDiv.classList.remove('show');
            });
            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') modal.classList.remove('active');
                if (e.ctrlKey && e.shiftKey && e.key === 'L') { e.preventDefault(); getLocation(); }
                if (e.ctrlKey && e.shiftKey && e.key === 'B') { e.preventDefault(); sidebar.classList.toggle('collapsed'); }
                for (let i = 1; i <= 5; i++) {
                    if (e.ctrlKey && e.shiftKey && e.key === String(i)) {
                        e.preventDefault();
                        flyToLocation(MASTER_LOCATIONS[i-1]);
                    }
                }
            });
        }

        initMap();
        bindEvents();
        setTimeout(() => showToast("", 5000), 1000);
        console.log();
    })();
</script>
</body>
</html>
