<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Monster Energy • Dhule</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e8e8e8;
            height: 100vh;
            overflow: hidden;
        }
        #map {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        .leaflet-tile {
            filter: grayscale(100%) !important;
            opacity: 0.95;
        }
        .monster-logo {
            width: 38px;
            height: 38px;
            background: radial-gradient(circle at 30% 35%, #1ecc00, #006600);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.5rem;
            color: white;
            font-family: 'Impact', 'Arial Black', sans-serif;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 0 2px black;
            text-shadow: 1px 1px 0 #000;
        }
        #sidebar {
            position: fixed;
            z-index: 15;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 380px;
            max-height: calc(100vh - 48px);
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
        }
        #sidebar.collapsed {
            transform: translateY(-50%) translateX(-130%);
            opacity: 0;
            pointer-events: none;
        }
        .sidebar-header {
            padding: 22px 20px 14px 22px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(0, 0, 0, 0.2);
        }
        .brand-text {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            color: white;
        }
        .tagline {
            font-size: 0.7rem;
            color: #eee;
        }
        .city-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            margin: 8px 0 0 22px;
            padding: 5px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            backdrop-filter: blur(4px);
            border: 0.5px solid rgba(255,255,255,0.3);
            color: #fff;
        }
        .spot-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .monster-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px) saturate(150%);
            -webkit-backdrop-filter: blur(12px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.35);
            border-radius: 28px;
            padding: 16px;
            transition: 0.2s;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            color: white;
        }
        .monster-card:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: rgba(255, 215, 0, 0.6);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }
        .spot-name {
            font-size: 1rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
        }
        .spot-name span {
            background: rgba(0, 0, 0, 0.5);
            font-size: 0.65rem;
            padding: 3px 8px;
            border-radius: 30px;
            color: #ffd966;
            backdrop-filter: blur(2px);
        }
        .address-detail {
            font-size: 0.75rem;
            color: #f0f0f0;
            margin: 6px 0;
        }
        .coords-text {
            font-family: monospace;
            font-size: 0.65rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 4px 8px;
            border-radius: 12px;
            display: inline-block;
            margin: 6px 0;
        }
        .action-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .btn-take-me, .btn-route, .btn-info {
            border: none;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
            backdrop-filter: blur(4px);
            color: white;
        }
        .btn-take-me {
            background: rgba(0, 102, 204, 0.85);
        }
        .btn-take-me:hover {
            background: #0088ff;
            transform: scale(0.97);
        }
        .btn-route {
            background: rgba(40, 167, 69, 0.85);
        }
        .btn-route:hover {
            background: #34ce57;
            transform: scale(0.97);
        }
        .btn-info {
            background: rgba(255, 193, 7, 0.85);
        }
        .btn-info:hover {
            background: #ffca2c;
            transform: scale(0.97);
        }
        .distance-info {
            font-size: 0.7rem;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 10px;
            border-radius: 50px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            color: white;
        }
        .sidebar-footer {
            padding: 12px 16px 18px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.2);
        }
        .side-btn {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 10px 0;
            font-weight: 600;
            font-size: 0.75rem;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }
        .side-btn.primary {
            background: rgba(255, 255, 255, 0.85);
            color: #000;
            border-color: rgba(255,255,255,0.5);
        }
        .side-btn:hover {
            background: rgba(100, 100, 120, 0.7);
        }
        .fab {
            position: fixed;
            z-index: 20;
            right: 18px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 6px 14px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .fab:hover {
            background: rgba(40,40,50,0.9);
            transform: scale(1.05);
        }
        #fab-locate { bottom: 90px; }
        #fab-toggle-sidebar { bottom: 150px; }
        
        /* ===== TOP TOAST ===== */
        .toast-notify {
            position: fixed;
            z-index: 200;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-150px);
            background: rgba(0, 0, 0, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.35);
            border-radius: 20px;
            padding: 18px 28px;
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 600;
            font-size: 1rem;
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            white-space: nowrap;
            color: white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            max-width: 92%;
            pointer-events: auto;
            opacity: 0;
        }
        .toast-notify.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }
        .toast-notify .toast-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }
        .toast-notify .toast-content {
            display: flex;
            flex-direction: column;
        }
        .toast-notify .toast-title {
            font-weight: 700;
            font-size: 1.1rem;
            color: #ffd966;
        }
        .toast-notify .toast-sub {
            font-weight: 400;
            font-size: 0.85rem;
            color: #ccc;
            margin-top: 2px;
        }
        .toast-close {
            margin-left: 12px;
            opacity: 0.5;
            cursor: pointer;
            font-size: 1.2rem;
            padding: 4px 8px;
            border-radius: 50%;
            transition: 0.2s;
            flex-shrink: 0;
        }
        .toast-close:hover {
            opacity: 1;
            background: rgba(255,255,255,0.1);
        }
        
        .location-status {
            position: fixed;
            z-index: 15;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 40px;
            padding: 6px 14px;
            font-size: 0.7rem;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
        }
        .dot.active { background: #4caf50; }

        /* ---- SHOP INFO POPUP ---- */
        .info-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
        }
        .info-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .info-popup {
            background: rgba(25, 30, 35, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 40px;
            width: 92%;
            max-width: 520px;
            max-height: 80vh;
            padding: 32px 28px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.6);
            color: #f0f0f0;
            overflow-y: auto;
            transform: scale(0.92) translateY(20px);
            transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.35s ease;
            opacity: 0;
        }
        .info-overlay.active .info-popup {
            transform: scale(1) translateY(0);
            opacity: 1;
        }
        .info-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.15);
            padding-bottom: 16px;
        }
        .info-popup-title {
            font-size: 1.7rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .info-popup-title .emoji { font-size: 2rem; }
        .info-close-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .info-close-btn:hover {
            background: rgba(255,70,70,0.4);
            transform: scale(0.95);
        }
        .info-body {
            font-size: 0.95rem;
            line-height: 1.7;
            color: #ddd;
        }
        .info-body .field { margin-bottom:14px; }
        .info-body .field-label {
            font-weight:700;
            color:#ffd966;
            display:inline-block;
            min-width:90px;
        }
        .info-body .field-value { color:#eee; }
        .info-body .divider {
            border:none;
            border-top:1px solid rgba(255,255,255,0.1);
            margin:18px 0;
        }
        .info-body .shop-hours {
            display:flex;
            justify-content:space-between;
            padding:4px 0;
            border-bottom:0.5px solid rgba(255,255,255,0.05);
        }
        .info-body .shop-hours:last-child { border-bottom:none; }
        .info-popup .badge-tag {
            display:inline-block;
            background:rgba(255,215,0,0.2);
            color:#ffd966;
            font-size:0.7rem;
            padding:2px 12px;
            border-radius:30px;
            border:0.5px solid rgba(255,215,0,0.3);
            margin-left:8px;
        }
        .info-popup::-webkit-scrollbar { width:4px; }
        .info-popup::-webkit-scrollbar-track { background:transparent; }
        .info-popup::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.3); border-radius:10px; }

        /* ---- BOTTOM BUBBLE ---- */
        #bottomBubble {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(150px);
            z-index: 30;
            width: 92%;
            max-width: 520px;
            background: rgba(25, 30, 35, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 32px;
            padding: 20px 24px 22px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.5s ease;
            opacity: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 12px;
            color: white;
        }
        #bottomBubble.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            pointer-events: auto;
        }
        .bubble-header {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .bubble-icon { font-size:1.8rem; }
        .bubble-title {
            font-size:1.2rem;
            font-weight:700;
            letter-spacing:-0.3px;
        }
        .bubble-tag {
            background:rgba(255,215,0,0.2);
            color:#ffd966;
            font-size:0.6rem;
            padding:2px 10px;
            border-radius:30px;
            border:0.5px solid rgba(255,215,0,0.3);
            margin-left:6px;
        }
        .bubble-address {
            font-size:0.8rem;
            color:#ccc;
            margin-top:-4px;
        }
        .bubble-distance {
            font-size:0.75rem;
            color:#88ff88;
            display:flex;
            align-items:center;
            gap:6px;
        }
        .bubble-actions {
            display:flex;
            gap:10px;
            flex-wrap:wrap;
            margin-top:4px;
        }
        .bubble-actions .btn-take-me,
        .bubble-actions .btn-route,
        .bubble-actions .btn-info {
            flex:1;
            justify-content:center;
            padding:10px 16px;
            font-size:0.75rem;
            min-width:80px;
        }
        .bubble-close {
            position:absolute;
            top:12px;
            right:16px;
            background:rgba(255,255,255,0.06);
            border:1px solid rgba(255,255,255,0.12);
            color:white;
            width:32px;
            height:32px;
            border-radius:50%;
            font-size:1rem;
            cursor:pointer;
            transition:0.2s;
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:2;
        }
        .bubble-close:hover {
            background:rgba(255,70,70,0.3);
            transform:scale(0.95);
        }
        #bottomBubble .btn-take-me { background: rgba(0,102,204,0.85); }
        #bottomBubble .btn-route { background: rgba(40,167,69,0.85); }
        #bottomBubble .btn-info { background: rgba(255,193,7,0.85); }

        /* ---- PULSE WAVE ANIMATION ---- */
        .pulse-wave-container {
            position: fixed;
            pointer-events: none;
            z-index: 10;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            overflow: visible;
        }
        .pulse-ring {
            position: absolute;
            border: 4px solid rgba(66, 133, 244, 0.8);
            border-radius: 50%;
            background: rgba(66, 133, 244, 0.05);
            box-shadow: 0 0 40px rgba(66, 133, 244, 0.2);
            animation: pulseExpand 2.5s ease-out forwards;
            transform: translate(-50%, -50%);
        }
        @keyframes pulseExpand {
            0% {
                width: 30px;
                height: 30px;
                opacity: 1;
                border-width: 4px;
            }
            100% {
                width: 2500px;
                height: 2500px;
                opacity: 0;
                border-width: 1px;
            }
        }

        /* ---- RESPONSIVE ---- */
        @media (max-width: 640px) {
            #sidebar { left: 12px; right: 12px; width: auto; top: auto; bottom: 12px; transform: translateY(0); max-height: 55vh; }
            #sidebar.collapsed { transform: translateY(110%); }
            .fab { width: 42px; height: 42px; }
            #fab-locate { bottom: 70px; }
            #fab-toggle-sidebar { bottom: 122px; }
            .btn-group { flex-direction: column; width: 100%; }
            .btn-take-me, .btn-route, .btn-info { justify-content: center; width: 100%; }
            .distance-info { white-space: normal; text-align: center; margin-top: 5px; width: 100%; }
            .action-row { flex-direction: column; align-items: stretch; }
            .info-popup { padding: 24px 18px; max-height: 70vh; }
            .info-popup-title { font-size: 1.3rem; }
            #bottomBubble { padding: 16px 18px 18px; width: 95%; bottom: 16px; }
            .bubble-actions .btn-take-me,
            .bubble-actions .btn-route,
            .bubble-actions .btn-info { font-size: 0.7rem; padding: 8px 12px; min-width: 60px; }
            .bubble-title { font-size: 1rem; }
            .toast-notify { padding: 14px 20px; font-size: 0.85rem; top: 15px; }
            .toast-notify .toast-icon { font-size: 1.4rem; }
            .toast-notify .toast-title { font-size: 0.95rem; }
            .toast-notify .toast-sub { font-size: 0.75rem; }
            @keyframes pulseExpand {
                0% { width: 20px; height: 20px; }
                100% { width: 1200px; height: 1200px; }
            }
        }
        .monster-card.nearest {
            border: 1px solid #ffcc00;
            background: rgba(255, 215, 0, 0.15);
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.3);
        }
        .distance-loading {
            opacity: 0.7;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }
        @keyframes dropBounce {
            0% { transform: translateY(-300px) scale(0.5) rotate(-10deg); opacity:0; }
            60% { transform: translateY(20px) scale(1.15) rotate(5deg); opacity:1; }
            80% { transform: translateY(-8px) scale(0.95); }
            100% { transform: translateY(0) scale(1) rotate(0deg); opacity:1; }
        }
        .marker-drop {
            animation: dropBounce 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: 0.25s;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-card {
            background: rgba(20,20,20,0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 32px;
            width: 90%;
            max-width: 360px;
            padding: 24px;
            text-align: center;
            color: white;
        }
    </style>
</head>
<body>

<div id="map"></div>
<div class="location-status" id="locationStatus"><span class="dot" id="statusDot"></span><span id="statusText">Location off</span></div>

<!-- PULSE WAVE CONTAINER -->
<div class="pulse-wave-container" id="pulseContainer"></div>

<aside id="sidebar">
    <div class="sidebar-header">
        <div class="monster-logo">M</div>
        <div>
            <div class="brand-text">MONSTER ENERGY</div>
            <div class="tagline">⚡ Dhule • Maharashtra</div>
        </div>
    </div>
    <div class="city-badge">📍 5 spots •</div>
    <div class="spot-container" id="spotList"></div>
    <div class="sidebar-footer">
        <button class="side-btn" id="refreshBtn">🔄 Refresh</button>
        <button class="side-btn primary" id="locateMeBtn">📍 Get My Location</button>
    </div>
</aside>

<!-- BOTTOM BUBBLE -->
<div id="bottomBubble">
    <button class="bubble-close" id="bubbleClose">✕</button>
    <div class="bubble-header">
        <span class="bubble-icon" id="bubbleIcon">🧃</span>
        <span class="bubble-title" id="bubbleTitle">Shop Name</span>
        <span class="bubble-tag" id="bubbleTag">MAIN</span>
    </div>
    <div class="bubble-address" id="bubbleAddress">📍 Address here</div>
    <div class="bubble-distance" id="bubbleDistance">🚗 0.0 km away</div>
    <div class="bubble-actions">
        <button class="btn-take-me" id="bubbleTakeMe">📍 Take me</button>
        <button class="btn-route" id="bubbleRoute">🧭 Route</button>
        <button class="btn-info" id="bubbleInfo">ℹ️ Info</button>
    </div>
</div>

<!-- SHOP INFO POPUP -->
<div class="info-overlay" id="infoOverlay">
    <div class="info-popup" id="infoPopup">
        <div class="info-popup-header">
            <div class="info-popup-title">
                <span class="emoji">𓆩✧𓆪</span>
                <span id="popupShopName">Shop Name</span>
                <span class="badge-tag" id="popupShopTag">MAIN</span>
            </div>
            <button class="info-close-btn" id="infoCloseBtn">✕</button>
        </div>
        <div class="info-body" id="popupBody"></div>
    </div>
</div>

</div>

<div id="addModal" class="modal-overlay"><div class="modal-card"><h3>𓆩Monster Energy Dhule𓆪</h3><p>Tap the ℹ️ Info button on any shop for details.</p><button id="modalCloseBtn" style="margin-top:15px;padding:8px 20px;">OK</button></div></div>

<button id="fab-toggle-sidebar" class="fab">🗂️</button>
<button id="fab-locate" class="fab">📍</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    (function() {
        // ----- SHOP DATA -----
        const SHOP_INFO = {
            spot_main: {
                name: "Singhavis Sweet",
                tag: "MAIN",
                emoji: "🏪",
                description: "Your go-to spot for Monster Energy drinks in Dhule city center. Wide variety of flavors and cold stock available.",
                address: "Near Dhule City Center, Dhule, Maharashtra",
                phone: "09096001600",
                hours: [{ day: "Monday - Saturday", time: "9:00 AM –9:30PM" }],
                features: ["🥤 All Monster flavors", "❄️ Chilled drinks", "💳 Card accepted", "A lot of varition of snacks🍔 "]
            },
            spot_square: {
                name: "Amul Enterprises",
                tag: "NEW",
                emoji: "🏪",
                description: "Located at Tower Chowk, this is a popular spot for students and office workers. Grab a Monster and stay energized!",
                address: "Tower Chowk, Dhule, Maharashtra",
                phone: "number not provided ",
                hours: [{ day: "Monday - Friday", time: "9:00 AM – 11:00pm" }],
                features: ["🥤 Monster & other energy drinks", "🍫 Snacks", "💰 Cash & UPI"]
            },
            spot_third: {
                name: "Amul SSD",
                tag: "THIRD",
                emoji: "🚌",
                description: "Conveniently located near Dhule highway road. Perfect for travelers looking for a quick energy boost.",
                address: "Sakri road, Dhule, Maharashtra",
                phone: "Number not provided ",
                hours: [{ day: "Everyday", time: "10:00 AM – 10:00 PM" }],
                features: ["🥤 Monster Energy", "💧 Bottled water", "other snacks🍔", "⌚ Quick service"]
            },
            spot_fourth: {
                name: "Just Chill",
                tag: "FOURTH",
                emoji: "🛍️",
                description: "Situated in the heart of Dhule Market, this plaza outlet offers Monster Energy alongside other refreshments.",
                address: "Near Dhule Market, Dhule, Maharashtra",
                phone: "+91 98765 43213",
                hours: [{ day: "Monday - Saturday", time: "10:00 AM – 10:00 PM" }],
                features: ["🥤 Monster variety", "🛒 Grocery items", "💳 Card & UPI", "🅿️ Parking nearby"]
            },
            spot_fifth: {
                name: "Soda Pub",
                tag: "FIFTH",
                emoji: "🏙️",
                description: "Serving the northern part of Dhule, this spot is a favorite among locals for its friendly service and cold Monster drinks.",
                address: "North Dhule Area, Dhule, Maharashtra",
                phone: "+91 98765 43214",
                hours: [{ day: "Monday - Sunday", time: "8:00 AM – 10:00 PM" }],
                features: ["🥤 Chilled Monster", "☕ Coffee & tea", "Some really good sodas", "Snacks available "]
            }
        };

        const MASTER_LOCATIONS = [
            { id: "spot_main", name: "Singavis Sweets", lat: 20.892272, lng: 74.773925, address: "Near Dhule City Center", coordsDMS: "20°53'32.18\"N 74°46'26.13\"E", tag: "MAIN" },
            { id: "spot_square", name: "Amul Enterprises ", lat: 20.911280555555555, lng: 74.75695, address: "Tower Chowk, Dhule", coordsDMS: "20°54'40.61\"N 74°45'25.02\"E", tag: "NEW" },
            { id: "spot_third", name: "Amul SSD", lat: 20.90357777777778, lng: 74.7496, address: "Near Dhule Bus Stand", coordsDMS: "20°54'12.88\"N 74°44'58.56\"E", tag: "THIRD" },
            { id: "spot_fourth", name: "Just Chill", lat: 20.904041666666666, lng: 74.75639444444444, address: "Near Dhule Market", coordsDMS: "20°54'14.55\"N 74°45'23.02\"E", tag: "FOURTH" },
            { id: "spot_fifth", name: "Soda Pub", lat: 20.920369444444444, lng: 74.76649166666666, address: "North Dhule Area", coordsDMS: "20°55'13.33\"N 74°45'59.37\"E", tag: "FIFTH" }
        ];

        let map;
        let markers = [];
        let userMarker = null;
        let userLocation = null;
        let watchId = null;
        let manualFlyInProgress = false;
        let userInteracting = false;
        let roadDistanceCache = new Map();
        let dropMarker = null;
        let isBubbleDismissed = false;
        let isFirstLocation = true;

        // DOM elements
        const spotContainer = document.getElementById('spotList');
        const locateBtn = document.getElementById('locateMeBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const fabLocate = document.getElementById('fab-locate');
        const fabToggle = document.getElementById('fab-toggle-sidebar');
        const sidebar = document.getElementById('sidebar');
        const toastDiv = document.getElementById('globalToast');
        const toastIcon = document.getElementById('toastIcon');
        const toastTitle = document.getElementById('toastTitle');
        const toastMsgSpan = document.getElementById('toastMsg');
        const closeToast = document.getElementById('closeToastBtn');
        const modal = document.getElementById('addModal');
        const modalClose = document.getElementById('modalCloseBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const infoOverlay = document.getElementById('infoOverlay');
        const popupShopName = document.getElementById('popupShopName');
        const popupShopTag = document.getElementById('popupShopTag');
        const popupBody = document.getElementById('popupBody');
        const infoCloseBtn = document.getElementById('infoCloseBtn');
        const bottomBubble = document.getElementById('bottomBubble');
        const bubbleIcon = document.getElementById('bubbleIcon');
        const bubbleTitle = document.getElementById('bubbleTitle');
        const bubbleTag = document.getElementById('bubbleTag');
        const bubbleAddress = document.getElementById('bubbleAddress');
        const bubbleDistance = document.getElementById('bubbleDistance');
        const bubbleTakeMe = document.getElementById('bubbleTakeMe');
        const bubbleRoute = document.getElementById('bubbleRoute');
        const bubbleInfo = document.getElementById('bubbleInfo');
        const bubbleClose = document.getElementById('bubbleClose');
        const pulseContainer = document.getElementById('pulseContainer');

        let toastTimer = null;
        
        function showToast(title, message, icon = '🧃', duration = 4000) {
            toastIcon.textContent = icon;
            toastTitle.textContent = title;
            toastMsgSpan.textContent = message;
            toastDiv.classList.add('show');
            if (toastTimer) clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toastDiv.classList.remove('show');
            }, duration);
        }

        function updateStatusUI(active) {
            if (active && userLocation) {
                statusDot.classList.add('active');
                statusText.innerText = 'Active';
            } else {
                statusDot.classList.remove('active');
                statusText.innerText = 'Off';
            }
        }

        function distanceMeters(lat1, lng1, lat2, lng2) {
            const R = 6371000;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLng = (lng2 - lng1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        function formatDistance(meters) {
            if (meters === null || meters === undefined) return '—';
            return meters < 1000 ? Math.round(meters) + ' m' : (meters/1000).toFixed(1) + ' km';
        }

        async function fetchDrivingDistance(originLat, originLng, destLat, destLng) {
            const url = `https://router.project-osrm.org/route/v1/driving/${originLng},${originLat};${destLng},${destLat}?overview=false`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (data.code === 'Ok' && data.routes && data.routes.length > 0) return data.routes[0].distance;
                return null;
            } catch (err) { return null; }
        }

        async function getRoadDistance(loc) {
            if (!userLocation) return null;
            const key = `${loc.id}_${userLocation.lat.toFixed(4)}_${userLocation.lng.toFixed(4)}`;
            if (roadDistanceCache.has(key)) return roadDistanceCache.get(key);
            const dist = await fetchDrivingDistance(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
            if (dist !== null) roadDistanceCache.set(key, dist);
            return dist;
        }

        function getNearestShop() {
            if (!userLocation || !MASTER_LOCATIONS.length) return null;
            let nearest = null, minDist = Infinity;
            for (const loc of MASTER_LOCATIONS) {
                const d = distanceMeters(userLocation.lat, userLocation.lng, loc.lat, loc.lng);
                if (d < minDist) { minDist = d; nearest = loc; }
            }
            return nearest;
        }

        // ---- PULSE WAVE FUNCTION (CSS animated) ----
        function createPulseWave(lat, lng) {
            // Remove any existing pulse rings
            const existingRings = pulseContainer.querySelectorAll('.pulse-ring');
            existingRings.forEach(el => el.remove());

            // Convert lat/lng to pixel position on screen
            const point = map.latLngToContainerPoint([lat, lng]);
            const x = point.x;
            const y = point.y;

            // Create the ring element
            const ring = document.createElement('div');
            ring.className = 'pulse-ring';
            ring.style.left = x + 'px';
            ring.style.top = y + 'px';
            pulseContainer.appendChild(ring);

            // Auto-remove after animation completes
            setTimeout(() => {
                if (ring.parentNode) ring.remove();
            }, 2800);
        }

        // ---- SHOP INFO POPUP ----
        function openShopInfo(shopId) {
            const info = SHOP_INFO[shopId];
            if (!info) {
                showToast('⚠️ Info Unavailable', 'This shop has no details yet.', '📋', 3000);
                return;
            }
            popupShopName.textContent = info.name;
            popupShopTag.textContent = info.tag || 'SHOP';
            let html = `
                <div class="field">
                    <span class="field-label">📍 Address</span>
                    <span class="field-value">${escapeHtml(info.address)}</span>
                </div>
                <div class="field">
                    <span class="field-label">📞 Phone</span>
                    <span class="field-value">${escapeHtml(info.phone || 'N/A')}</span>
                </div>
                <hr class="divider">
                <div class="field">
                    <div style="font-weight:700; color:#ffd966; margin-bottom:6px;">📖 Description</div>
                    <div style="font-style:italic; color:#ccc;">${escapeHtml(info.description || 'No description available.')}</div>
                </div>
                <hr class="divider">
                <div class="field">
                    <div style="font-weight:700; color:#ffd966; margin-bottom:6px;">🕒 Opening Hours</div>
            `;
            if (info.hours && info.hours.length) {
                info.hours.forEach(h => {
                    if (h.day) {
                        html += `<div class="shop-hours"><span>${escapeHtml(h.day)}</span><span>${escapeHtml(h.time)}</span></div>`;
                    }
                });
            } else {
                html += `<div style="color:#999;">Hours not available</div>`;
            }
            html += `</div>`;
            if (info.features && info.features.length) {
                html += `<hr class="divider"><div class="field"><div style="font-weight:700; color:#ffd966; margin-bottom:6px;">✨ Features</div><div style="display:flex; flex-wrap:wrap; gap:6px;">`;
                info.features.forEach(f => {
                    html += `<span style="background:rgba(255,255,255,0.08); padding:4px 12px; border-radius:20px; font-size:0.8rem;">${escapeHtml(f)}</span>`;
                });
                html += `</div></div>`;
            }
            popupBody.innerHTML = html;
            infoOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeShopInfo() {
            infoOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ---- SIDEBAR RENDER ----
        async function renderSidebarWithRoadDistances() {
            if (!userLocation) {
                renderSidebarFallback();
                return;
            }
            const locsWithDist = await Promise.all(MASTER_LOCATIONS.map(async (loc) => {
                const roadDist = await getRoadDistance(loc);
                return { ...loc, roadDistance: roadDist };
            }));
            locsWithDist.sort((a, b) => {
                if (a.roadDistance === null && b.roadDistance === null) return 0;
                if (a.roadDistance === null) return 1;
                if (b.roadDistance === null) return -1;
                return a.roadDistance - b.roadDistance;
            });
            spotContainer.innerHTML = '';
            locsWithDist.forEach((loc, idx) => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                if (idx === 0) card.classList.add('nearest');
                const distanceText = (loc.roadDistance !== null) ? `🚗 ${formatDistance(loc.roadDistance)}` : '⚠️ route unavailable';
                card.innerHTML = `
                    <div class="spot-name">
                        🧃 ${escapeHtml(loc.name)} <span>${escapeHtml(loc.tag)}</span>
                    </div>
                    <div class="address-detail">📍 ${escapeHtml(loc.address)}</div>
                    <div class="coords-text">🧭 ${loc.coordsDMS}</div>
                    <div class="action-row">
                        <div class="btn-group">
                            <button class="btn-take-me" data-id="${loc.id}">📍 Take me</button>
                            <button class="btn-route" data-id="${loc.id}">🧭 Route</button>
                            <button class="btn-info" data-id="${loc.id}">ℹ️ Info</button>
                        </div>
                        <div class="distance-info" id="dist-${loc.id}">${distanceText}</div>
                    </div>
                `;
                spotContainer.appendChild(card);
            });
            attachButtonEvents();
        }

        function renderSidebarFallback() {
            spotContainer.innerHTML = '';
            MASTER_LOCATIONS.forEach(loc => {
                const card = document.createElement('div');
                card.className = 'monster-card';
                card.innerHTML = `
                    <div class="spot-name">
                        🧃 ${escapeHtml(loc.name)} <span>${escapeHtml(loc.tag)}</span>
                    </div>
                    <div class="address-detail">📍 ${escapeHtml(loc.address)}</div>
                    <div class="coords-text">🧭 ${loc.coordsDMS}</div>
                    <div class="action-row">
                        <div class="btn-group">
                            <button class="btn-take-me" data-id="${loc.id}">📍 Take me</button>
                            <button class="btn-route" data-id="${loc.id}">🧭 Route</button>
                            <button class="btn-info" data-id="${loc.id}">ℹ️ Info</button>
                        </div>
                        <div class="distance-info">📍 enable location</div>
                    </div>
                `;
                spotContainer.appendChild(card);
            });
            attachButtonEvents();
        }

        function attachButtonEvents() {
            document.querySelectorAll('.btn-take-me').forEach(btn => {
                btn.removeEventListener('click', takeMeHandler);
                btn.addEventListener('click', takeMeHandler);
            });
            document.querySelectorAll('.btn-route').forEach(btn => {
                btn.removeEventListener('click', routeHandler);
                btn.addEventListener('click', routeHandler);
            });
            document.querySelectorAll('.btn-info').forEach(btn => {
                btn.removeEventListener('click', infoHandler);
                btn.addEventListener('click', infoHandler);
            });
        }

        function takeMeHandler(e) {
            e.stopPropagation();
            const id = e.currentTarget.getAttribute('data-id');
            const loc = MASTER_LOCATIONS.find(l => l.id === id);
            if (loc) flyToLocation(loc);
        }
        function routeHandler(e) {
            e.stopPropagation();
            const id = e.currentTarget.getAttribute('data-id');
            const loc = MASTER_LOCATIONS.find(l => l.id === id);
            if (loc) openGoogleMapsRoute(loc.lat, loc.lng, loc.name);
        }
        function infoHandler(e) {
            e.stopPropagation();
            const id = e.currentTarget.getAttribute('data-id');
            openShopInfo(id);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function openGoogleMapsRoute(destLat, destLng, destName) {
            if (!userLocation) {
                showToast('📍 Location Required', 'Please enable location first.', '📍', 3000);
                return;
            }
            const origin = `${userLocation.lat},${userLocation.lng}`;
            const destination = `${destLat},${destLng}`;
            const url = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${destination}&travelmode=driving`;
            window.open(url, '_blank');
            showToast('🧭 Route Opened', `Directions to ${destName} in Google Maps`, '🗺️', 3000);
        }

        function createMonsterIcon() {
            const html = `<div style="width:36px;height:36px;background:radial-gradient(circle at 30% 35%, #1ecc00, #006600);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.4rem;color:white;font-family:'Impact',sans-serif;border:2px solid #ffcc00;box-shadow:0 0 0 2px black;">M</div>`;
            return L.divIcon({ html, iconSize: [36,36], iconAnchor: [18,18], popupAnchor: [0, -20] });
        }

        function createDropIcon() {
            const html = `<div style="width:28px;height:28px;background:#4285f4;border-radius:50%;border:3px solid white;box-shadow:0 0 0 6px rgba(66,133,244,0.3), 0 0 0 12px rgba(66,133,244,0.15);"></div>`;
            return L.divIcon({ html, iconSize: [28,28], iconAnchor: [14,14] });
        }

        function createUserIcon() {
            const html = `<div style="width:20px;height:20px;background:#4285f4;border-radius:50%;border:3px solid white;box-shadow:0 0 0 4px rgba(66,133,244,0.3);"></div>`;
            return L.divIcon({ html, iconSize: [20,20], iconAnchor: [10,10] });
        }

        function renderMarkers() {
            markers.forEach(m => map.removeLayer(m.marker));
            markers = [];
            MASTER_LOCATIONS.forEach(loc => {
                const icon = createMonsterIcon();
                const marker = L.marker([loc.lat, loc.lng], { icon })
                    .addTo(map)
                    .bindPopup(`<div style="text-align:center;"><strong>🧃 ${escapeHtml(loc.name)}</strong><br/>${escapeHtml(loc.address)}<br/><small>${loc.coordsDMS}</small></div>`);
                markers.push({ marker, id: loc.id });
            });
        }

        function renderUserMarker() {
            if (userMarker) map.removeLayer(userMarker);
            if (userLocation) {
                const icon = createUserIcon();
                userMarker = L.marker([userLocation.lat, userLocation.lng], { icon, zIndexOffset: 1000 })
                    .addTo(map)
                    .bindPopup('<b>📍 You are here</b>');
            }
        }

        function flyToLocation(loc) {
            if (!map) return;
            manualFlyInProgress = true;
            map.flyTo([loc.lat, loc.lng], 16, { duration: 1.2 });
            setTimeout(() => {
                const markerObj = markers.find(m => m.id === loc.id);
                if (markerObj) {
                    markerObj.marker.openPopup();
                    const el = markerObj.marker.getElement();
                    if (el) {
                        el.style.transform = 'scale(1.3)';
                        setTimeout(() => { if (el) el.style.transform = ''; }, 400);
                    }
                }
                setTimeout(() => { manualFlyInProgress = false; }, 1500);
            }, 300);
            showToast('✈️ Flying To', loc.name, '🧃', 2500);
        }

        function autoFitBounds() {
            if (manualFlyInProgress || userInteracting) return;
            if (!userLocation) return;
            const allPoints = MASTER_LOCATIONS.map(l => [l.lat, l.lng]);
            allPoints.push([userLocation.lat, userLocation.lng]);
            map.fitBounds(L.latLngBounds(allPoints), { padding: [60, 60] });
        }

        // ---- DROP & PULSE ----
        function animateDropAndPulse(lat, lng, shopName) {
            // Remove previous drop marker
            if (dropMarker) { map.removeLayer(dropMarker); dropMarker = null; }

            // Drop marker with bounce animation
            const icon = createDropIcon();
            dropMarker = L.marker([lat, lng], { icon, zIndexOffset: 900 }).addTo(map);
            const el = dropMarker.getElement();
            if (el) {
                el.classList.add('marker-drop');
                setTimeout(() => { if (el) el.classList.remove('marker-drop'); }, 1000);
            }
            setTimeout(() => {
                if (dropMarker) dropMarker.bindPopup(`<b>📍 ${shopName}</b>`).openPopup();
            }, 600);

            // === PULSE WAVE - using CSS animation for smooth effect ===
            setTimeout(() => {
                createPulseWave(lat, lng);
            }, 300);

            // Fly to location
            map.flyTo([lat, lng], 15, { duration: 1.0 });
        }

        // ---- BOTTOM BUBBLE ----
        function showBottomBubble(shop) {
            if (isBubbleDismissed) return;
            if (!shop) return;
            const info = SHOP_INFO[shop.id];
            bubbleIcon.textContent = info?.emoji || '🧃';
            bubbleTitle.textContent = shop.name;
            bubbleTag.textContent = shop.tag || 'SHOP';
            bubbleAddress.textContent = `📍 ${shop.address}`;
            const dist = distanceMeters(userLocation.lat, userLocation.lng, shop.lat, shop.lng);
            bubbleDistance.textContent = `🚗 ${formatDistance(dist)} away`;
            bottomBubble.dataset.shopId = shop.id;
            bottomBubble.classList.add('show');
        }

        function hideBottomBubble() {
            bottomBubble.classList.remove('show');
            isBubbleDismissed = true;
        }

        function resetBubbleDismissal() {
            isBubbleDismissed = false;
        }

        // Bubble button handlers
        bubbleTakeMe.addEventListener('click', function() {
            const id = bottomBubble.dataset.shopId;
            const loc = MASTER_LOCATIONS.find(l => l.id === id);
            if (loc) flyToLocation(loc);
        });
        bubbleRoute.addEventListener('click', function() {
            const id = bottomBubble.dataset.shopId;
            const loc = MASTER_LOCATIONS.find(l => l.id === id);
            if (loc) openGoogleMapsRoute(loc.lat, loc.lng, loc.name);
        });
        bubbleInfo.addEventListener('click', function() {
            const id = bottomBubble.dataset.shopId;
            if (id) openShopInfo(id);
        });
        bubbleClose.addEventListener('click', hideBottomBubble);

        // ---- REFRESH UI AFTER LOCATION ----
        async function refreshUIAfterLocation(shouldFitBounds = false) {
            renderUserMarker();
            if (userLocation) {
                roadDistanceCache.clear();
                await renderSidebarWithRoadDistances();
                updateStatusUI(true);
                
                if (shouldFitBounds) {
                    autoFitBounds();
                }

                // Only show bubble and drop on initial location
                if (isFirstLocation || shouldFitBounds) {
                    const nearest = getNearestShop();
                    if (nearest) {
                        sidebar.classList.add('collapsed');
                        resetBubbleDismissal();
                        showBottomBubble(nearest);
                        animateDropAndPulse(nearest.lat, nearest.lng, nearest.name);
                        const dist = distanceMeters(userLocation.lat, userLocation.lng, nearest.lat, nearest.lng);
                        showToast('📍 Nearest Shop Found', `${nearest.name} — ${formatDistance(dist)} away`, '🧃', 4000);
                    }
                    isFirstLocation = false;
                }
            } else {
                renderSidebarFallback();
                updateStatusUI(false);
                hideBottomBubble();
            }
        }

        // ---- GET LOCATION ----
        function getLocation() {
            if (!navigator.geolocation) {
                showToast('⚠️ Unsupported', 'Your browser does not support geolocation.', '📍', 3000);
                return;
            }
            showToast('📍 Locating...', 'Requesting your location...', '📍', 2000);
            statusText.innerText = 'Requesting...';
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                    await refreshUIAfterLocation(true);
                    if (watchId) navigator.geolocation.clearWatch(watchId);
                    watchId = navigator.geolocation.watchPosition(
                        async (newPos) => {
                            userLocation = { lat: newPos.coords.latitude, lng: newPos.coords.longitude };
                            // Just update markers and distances, don't refit or re-drop
                            renderUserMarker();
                            await renderSidebarWithRoadDistances();
                            updateStatusUI(true);
                        },
                        err => console.warn("Watch error:", err),
                        { enableHighAccuracy: true, maximumAge: 10000 }
                    );
                },
                (err) => {
                    let msg = "";
                    if (err.code === 1) msg = "❌ Permission denied. Allow location access.";
                    else if (err.code === 2) msg = "📍 Location unavailable.";
                    else if (err.code === 3) msg = "⏰ Timeout.";
                    else msg = "⚠️ Could not get location.";
                    showToast('⚠️ Location Error', msg, '📍', 5000);
                    updateStatusUI(false);
                    statusText.innerText = 'Denied';
                    renderSidebarFallback();
                    hideBottomBubble();
                    const bounds = L.latLngBounds(MASTER_LOCATIONS.map(l => [l.lat, l.lng]));
                    map.fitBounds(bounds, { padding: [40, 40] });
                },
                { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
            );
        }

        // ---- REFRESH ----
        function refreshMap() {
            renderMarkers();
            if (userLocation) {
                refreshUIAfterLocation(true);
            } else {
                renderSidebarFallback();
                updateStatusUI(false);
                hideBottomBubble();
                const bounds = L.latLngBounds(MASTER_LOCATIONS.map(l => [l.lat, l.lng]));
                map.fitBounds(bounds, { padding: [40, 40] });
            }
            showToast('🔄 Refreshed', 'Map updated successfully.', '🔄', 2000);
        }

        // ---- INIT MAP ----
        function initMap() {
            const bounds = L.latLngBounds(MASTER_LOCATIONS.map(l => [l.lat, l.lng]));
            map = L.map('map').fitBounds(bounds, { padding: [40, 40] });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OSM & CartoDB',
                subdomains: 'abcd',
                maxZoom: 19,
            }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
            renderMarkers();
            renderSidebarFallback();
            updateStatusUI(false);
            map.on('dblclick', () => {
                modal.classList.add('active');
                setTimeout(() => modal.classList.remove('active'), 3000);
            });
            map.on('dragstart zoomstart', () => { userInteracting = true; });
            map.on('dragend zoomend', () => {
                setTimeout(() => { userInteracting = false; }, 500);
            });
        }

        // ---- BIND EVENTS ----
        function bindEvents() {
            locateBtn.addEventListener('click', getLocation);
            refreshBtn.addEventListener('click', refreshMap);
            fabLocate.addEventListener('click', getLocation);
            fabToggle.addEventListener('click', () => sidebar.classList.toggle('collapsed'));
            closeToast.addEventListener('click', (e) => {
                e.stopPropagation();
                toastDiv.classList.remove('show');
                if (toastTimer) clearTimeout(toastTimer);
            });
            toastDiv.addEventListener('click', (e) => {
                if (e.target === closeToast) return;
                if (userLocation) {
                    const nearest = getNearestShop();
                    if (nearest) flyToLocation(nearest);
                } else {
                    flyToLocation(MASTER_LOCATIONS[0]);
                }
                toastDiv.classList.remove('show');
            });
            modalClose.addEventListener('click', () => modal.classList.remove('active'));
            modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('active'); });
            infoCloseBtn.addEventListener('click', closeShopInfo);
            infoOverlay.addEventListener('click', (e) => {
                if (e.target === infoOverlay) closeShopInfo();
            });
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (infoOverlay.classList.contains('active')) closeShopInfo();
                    if (modal.classList.contains('active')) modal.classList.remove('active');
                    if (bottomBubble.classList.contains('show')) hideBottomBubble();
                }
                if (e.ctrlKey && e.shiftKey && e.key === 'L') { e.preventDefault(); getLocation(); }
                if (e.ctrlKey && e.shiftKey && e.key === 'B') { e.preventDefault(); sidebar.classList.toggle('collapsed'); }
                for (let i = 1; i <= 5; i++) {
                    if (e.ctrlKey && e.shiftKey && e.key === String(i)) {
                        e.preventDefault();
                        flyToLocation(MASTER_LOCATIONS[i-1]);
                    }
                }
            });
        }

        // ---- START ----
        initMap();
        bindEvents();
        setTimeout(() => {
            showToast('🦖 Monster Energy', 'Tap "Get My Location" to find the nearest shop', '🧃', 5000);
        }, 1000);
        console.log("✅ All fixed: Top toasts, bubble stays closed, no map shake, pulse wave NOW VISIBLE!");
    })();
</script>
</body>
</html>
